<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anonette</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, get, set, remove, query, orderByChild, endAt, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ▼▼▼ REPLACE THIS WITH YOUR FIREBASE CONFIG ▼▼▼
   const firebaseConfig = {
    apiKey: "AIzaSyDhQji3eZAc9px6EfcsnbTploNdy4_ADwE",
    authDomain: "myanonette.firebaseapp.com",
    databaseURL: "https://myanonette-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "myanonette",
    storageBucket: "myanonette.firebasestorage.app",
    messagingSenderId: "131799201767",
    appId: "1:131799201767:web:d23275c6e2830d4c6cef42"
  };
  // ▲▲▲ REPLACE THIS WITH YOUR FIREBASE CONFIG ▲▲▲

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const TTL = 24 * 60 * 60 * 1000; // 24 hours in ms

  // ── State ──────────────────────────────────────────────────
  let myNick = "";
  let myUUID = "";
  let curRoom = "";
  let curToken = "";
  let msgListener = null;

  // ── UUID: get or generate a persistent browser identity ───
  function getUUID() {
    let id = localStorage.getItem("anonette_uuid");
    if (!id) {
      id = crypto.randomUUID ? crypto.randomUUID()
        : ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
            (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
      localStorage.setItem("anonette_uuid", id);
    }
    return id;
  }

  // ── Auto-login: check if this browser already has a nick ──
  async function tryAutoLogin() {
    myUUID = getUUID();
    const savedNick = localStorage.getItem("anonette_nick");
    if (!savedNick) { showNickModal(); return; }

    // verify UUID still owns that nick in Firebase
    const snap = await get(ref(db, "nicks/" + savedNick));
    if (snap.exists() && snap.val().uuid === myUUID) {
      // returning user — skip modal
      myNick = savedNick;
      document.getElementById("cur-nick").textContent = myNick;
      document.getElementById("nick-modal").style.display = "none";
      const { roomId, token } = parseHash();
      joinRoom(roomId || "general", token);
    } else if (snap.exists() && snap.val().uuid !== myUUID) {
      // nick was claimed by someone else (rare), clear local and show modal
      localStorage.removeItem("anonette_nick");
      showNickModal("That nickname was claimed by another device. Pick a new one.");
    } else {
      // nick not in Firebase yet (cleared DB?) — re-register it
      await set(ref(db, "nicks/" + savedNick), { uuid: myUUID, since: Date.now() });
      myNick = savedNick;
      document.getElementById("cur-nick").textContent = myNick;
      document.getElementById("nick-modal").style.display = "none";
      const { roomId, token } = parseHash();
      joinRoom(roomId || "general", token);
    }
  }

  function showNickModal(errMsg) {
    document.getElementById("nick-modal").style.display = "flex";
    const err = document.getElementById("nick-error");
    if (errMsg) { err.textContent = errMsg; err.style.display = "block"; }
    else err.style.display = "none";
    document.getElementById("nick-input").focus();
  }

  // ── Parse URL ─────────────────────────────────────────────
  function parseHash() {
    const raw = decodeURIComponent(location.hash.slice(1));
    const [roomPart, queryPart] = raw.split("?");
    const params = new URLSearchParams(queryPart || "");
    return { roomId: roomPart, token: params.get("t") || "" };
  }

  // ── Set nick: check availability then lock to UUID ────────
  window.setNick = async function() {
    const inp = document.getElementById("nick-input");
    const btn = document.getElementById("join-btn");
    let n = inp.value.trim().replace(/[^a-zA-Z0-9_\-]/g, "");
    if (!n) n = "anon_" + Math.floor(Math.random() * 9999);

    btn.textContent = "[ CHECKING... ]";
    btn.disabled = true;

    myUUID = getUUID();
    const nickRef = ref(db, "nicks/" + n);
    const snap = await get(nickRef);

    if (snap.exists() && snap.val().uuid !== myUUID) {
      // nickname taken by a different browser
      document.getElementById("nick-error").textContent = "Nickname already taken. Try another.";
      document.getElementById("nick-error").style.display = "block";
      btn.textContent = "[ ENTER THE VOID ]";
      btn.disabled = false;
      return;
    }

    // register or re-confirm ownership
    await set(nickRef, { uuid: myUUID, since: Date.now() });
    localStorage.setItem("anonette_nick", n);
    localStorage.setItem("anonette_uuid", myUUID);

    myNick = n;
    document.getElementById("cur-nick").textContent = myNick;
    document.getElementById("nick-modal").style.display = "none";
    btn.textContent = "[ ENTER THE VOID ]";
    btn.disabled = false;

    const { roomId, token } = parseHash();
    joinRoom(roomId || "general", token);
  };

  // ── Change nick ────────────────────────────────────────────
  window.showNickModalChange = function() {
    document.getElementById("nick-input").value = myNick;
    showNickModal();
  };

  // ── Room join ──────────────────────────────────────────────
  async function joinRoom(roomId, token) {
    if (!roomId) return;
    curRoom = sanitizeRoom(roomId);
    curToken = token || "";

    // check if private room — validate token
    const metaSnap = await get(ref(db, "rooms/" + curRoom + "/meta"));
    if (metaSnap.exists()) {
      const meta = metaSnap.val();
      if (meta.private && meta.token !== curToken) {
        showAccessDenied();
        return;
      }
    }

    document.getElementById("messages").innerHTML = "";
    document.getElementById("room-name").textContent =
      "#" + curRoom + (metaSnap.exists() && metaSnap.val().private ? " 🔒" : "");

    // update URL and share link
    const shareUrl = buildShareUrl(curRoom, curToken);
    location.hash = curRoom + (curToken ? "?t=" + curToken : "");
    document.getElementById("share-link").value = shareUrl;

    // ensure room exists
    if (!metaSnap.exists()) {
      await set(ref(db, "rooms/" + curRoom + "/meta"), {
        created: Date.now(),
        creator: myNick,
        private: false,
        token: ""
      });
    }

    // purge messages older than 24h on join
    await purgeOldMessages(curRoom);

    // re-subscribe messages
    if (msgListener) msgListener();
    msgListener = onChildAdded(ref(db, "rooms/" + curRoom + "/messages"), snap => {
      const d = snap.val();
      appendMsg(d.nick, d.text, d.ts, d.sys);
    });

    loadRoomList();
    postSys(`${myNick} joined #${curRoom}`);
  }

  // ── Create room (public or private) ───────────────────────
  window.createRoom = async function() {
    const nameInp = document.getElementById("new-room-input");
    const isPrivate = document.getElementById("private-toggle").checked;
    let name = nameInp.value.trim().replace(/[^a-zA-Z0-9_\-]/g, "").toLowerCase();
    if (!name) return;
    nameInp.value = "";

    const token = isPrivate ? genToken() : "";
    curToken = token;

    // write meta immediately with privacy settings
    await set(ref(db, "rooms/" + name + "/meta"), {
      created: Date.now(),
      creator: myNick,
      private: isPrivate,
      token: token
    });

    await joinRoom(name, token);

    // if private, show the shareable link prominently
    if (isPrivate) {
      const link = buildShareUrl(name, token);
      document.getElementById("share-link").value = link;
      postSys("PRIVATE ROOM — share the link to invite others. Link-holders only.");
    }
  };

  // ── Send message ───────────────────────────────────────────
  window.sendMsg = async function() {
    const inp = document.getElementById("msg-input");
    const text = inp.value.trim();
    if (!text || !myNick || !curRoom) return;
    inp.value = "";
    await push(ref(db, "rooms/" + curRoom + "/messages"), {
      nick: myNick,
      text,
      ts: new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}),
      epoch: Date.now(),
      sys: false
    });
  };

  async function postSys(text) {
    await push(ref(db, "rooms/" + curRoom + "/messages"), {
      nick: "***",
      text,
      ts: new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}),
      epoch: Date.now(),
      sys: true
    });
  }

  // ── Auto-deletion: purge messages older than 24h ──────────
  async function purgeOldMessages(roomId) {
    const cutoff = Date.now() - TTL;
    const old = query(
      ref(db, "rooms/" + roomId + "/messages"),
      orderByChild("epoch"),
      endAt(cutoff)
    );
    const snap = await get(old);
    if (!snap.exists()) return;
    const removes = [];
    snap.forEach(child => removes.push(remove(child.ref)));
    await Promise.all(removes);
  }

  // ── Load room list (public rooms only in sidebar) ──────────
  async function loadRoomList() {
    const snap = await get(ref(db, "rooms"));
    const list = document.getElementById("rooms");
    list.innerHTML = "";
    if (!snap.exists()) return;
    snap.forEach(child => {
      const id = child.key;
      const meta = child.val().meta || {};
      if (meta.private) return; // hide private rooms from sidebar
      const div = document.createElement("div");
      div.className = "room-item" + (id === curRoom ? " active" : "");

      const label = document.createElement("span");
      label.className = "room-label";
      label.textContent = "#" + id;
      label.onclick = () => joinRoom(id, "");
      div.appendChild(label);

      const del = document.createElement("span");
      del.className = "room-del";
      del.textContent = "✕";
      del.title = "Delete room";
      del.onclick = (e) => { e.stopPropagation(); confirmDeleteRoom(id); };
      div.appendChild(del);

      list.appendChild(div);
    });
  }

  // ── Delete room ────────────────────────────────────────────
  window.confirmDeleteRoom = function(roomId) {
    const modal = document.getElementById("del-modal");
    document.getElementById("del-room-name").textContent = "#" + roomId;
    modal.style.display = "flex";
    window._pendingDelete = roomId;
  };

  window.cancelDelete = function() {
    document.getElementById("del-modal").style.display = "none";
    window._pendingDelete = null;
  };

  window.confirmDelete = async function() {
    const roomId = window._pendingDelete;
    if (!roomId) return;
    document.getElementById("del-modal").style.display = "none";
    window._pendingDelete = null;
    await remove(ref(db, "rooms/" + roomId));
    // if we deleted the current room, go to general
    if (roomId === curRoom) {
      curRoom = "";
      curToken = "";
      document.getElementById("messages").innerHTML = "";
      document.getElementById("room-name").textContent = "#—";
      document.getElementById("share-link").value = "";
      location.hash = "";
    }
    loadRoomList();
  };

  // ── Access denied screen ───────────────────────────────────
  function showAccessDenied() {
    document.getElementById("messages").innerHTML = `
      <div style="margin:auto;text-align:center;color:var(--gd);padding:40px 20px">
        <div style="font-family:'VT323',monospace;font-size:36px;color:#ff4444;margin-bottom:12px">ACCESS DENIED</div>
        <div style="font-size:12px">This is a private room.<br/>You need the correct invite link to enter.</div>
      </div>`;
    document.getElementById("room-name").textContent = "#" + curRoom + " 🔒";
  }

  // ── Render message ─────────────────────────────────────────
  function appendMsg(nick, text, ts, sys) {
    const box = document.getElementById("messages");
    const d = document.createElement("div");
    d.className = "msg" + (sys ? " sys" : "");
    const isMe = nick === myNick;
    d.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="nick ${sys ? "sys-nick" : isMe ? "self" : "other"}">${escHtml(nick)}</span>
      <span class="text">${escHtml(text)}</span>`;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  // ── Helpers ────────────────────────────────────────────────
  function sanitizeRoom(s) {
    return s.replace(/[^a-zA-Z0-9_\-]/g, "").toLowerCase().slice(0, 32) || "general";
  }
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function genToken() {
    return Array.from(crypto.getRandomValues(new Uint8Array(16)))
      .map(b => b.toString(16).padStart(2,"0")).join("");
  }
  function buildShareUrl(roomId, token) {
    const base = location.origin + location.pathname;
    return base + "#" + roomId + (token ? "?t=" + token : "");
  }

  // ── Copy link ──────────────────────────────────────────────
  window.copyLink = function() {
    const inp = document.getElementById("share-link");
    inp.select(); document.execCommand("copy");
    const btn = document.getElementById("copy-btn");
    btn.textContent = "COPIED!";
    setTimeout(() => btn.textContent = "COPY", 1500);
  };

  // ── Enter key handlers ─────────────────────────────────────
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("msg-input").addEventListener("keydown", e => { if (e.key === "Enter") sendMsg(); });
    document.getElementById("nick-input").addEventListener("keydown", e => { if (e.key === "Enter") setNick(); });
    document.getElementById("new-room-input").addEventListener("keydown", e => { if (e.key === "Enter") createRoom(); });
    tryAutoLogin();
  });

  window.showNickModal = () => {
    showNickModal();
  };
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --g: #00ff41; --gd: #007a1f; --gb: #020d04; --gdk: #001a06;
    --am: #ffb000; --amd: #7a5500;
    --scan: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.03) 2px,rgba(0,255,65,.03) 4px);
  }
  html, body { height: 100%; background: #000; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; }

  #app {
    width: 100%; max-width: 900px; height: 100vh; max-height: 680px;
    background: #0a0f0a; border: 2px solid var(--gd); display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  #app::before {
    content: ''; position: absolute; inset: 0;
    background: var(--scan); pointer-events: none; z-index: 10;
  }

  /* titlebar */
  #titlebar {
    background: var(--gdk); border-bottom: 1px solid var(--gd);
    padding: 6px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .logo { font-family: 'VT323', monospace; font-size: 22px; color: var(--g); letter-spacing: 2px; }
  #titlebar .spacer { flex: 1; }
  .nick-btn { font-size: 12px; color: var(--am); border: 1px solid var(--amd); padding: 2px 10px; cursor: pointer; background: transparent; font-family: inherit; }
  .nick-btn:hover { background: rgba(255,176,0,.1); }

  /* main area */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* sidebar */
  #sidebar { width: 170px; background: #040d06; border-right: 1px solid var(--gd); display: flex; flex-direction: column; flex-shrink: 0; }
  .sb-title { font-size: 11px; color: var(--gd); padding: 8px 10px; border-bottom: 1px solid var(--gd); letter-spacing: 1px; }
  #rooms { flex: 1; overflow-y: auto; }
  #rooms::-webkit-scrollbar { width: 4px; background: var(--gdk); }
  #rooms::-webkit-scrollbar-thumb { background: var(--gd); }
  .room-item { padding: 6px 10px; cursor: pointer; font-size: 13px; color: var(--gd); border-left: 3px solid transparent; display: flex; align-items: center; justify-content: space-between; }
  .room-item:hover { background: rgba(0,255,65,.05); color: var(--g); }
  .room-item.active { color: var(--g); border-left: 3px solid var(--g); background: rgba(0,255,65,.08); }
  .room-label { flex: 1; }
  .room-del { color: #ff4444; font-size: 11px; padding: 1px 5px; opacity: 0; transition: opacity .15s; cursor: pointer; border: 1px solid transparent; }
  .room-del:hover { border-color: #ff4444; background: rgba(255,68,68,.1); }
  .room-item:hover .room-del { opacity: 1; }

  /* delete confirm modal */
  #del-modal {
    position: absolute; inset: 0; background: rgba(0,10,2,.94);
    display: none; align-items: center; justify-content: center; z-index: 30;
  }
  #del-box { background: #040d06; border: 1px solid #ff4444; padding: 24px 28px; min-width: 280px; }
  #del-box h3 { font-family: 'VT323', monospace; font-size: 22px; color: #ff4444; margin-bottom: 8px; }
  #del-box p { font-size: 12px; color: var(--gd); margin-bottom: 20px; line-height: 1.6; }
  #del-box p span { color: var(--g); }
  .del-btns { display: flex; gap: 8px; }
  .del-btns button { flex: 1; background: transparent; font-family: inherit; font-size: 12px; padding: 6px; cursor: pointer; letter-spacing: 1px; }
  #del-confirm-btn { border: 1px solid #ff4444; color: #ff4444; }
  #del-confirm-btn:hover { background: rgba(255,68,68,.15); }
  #del-cancel-btn { border: 1px solid var(--gd); color: var(--g); }
  #del-cancel-btn:hover { background: rgba(0,255,65,.1); }
  .sb-create { border-top: 1px solid var(--gd); padding: 8px; }
  .sb-create input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gd);
    color: var(--g); font-family: inherit; font-size: 12px; outline: none; padding: 3px 0;
  }
  .sb-create input::placeholder { color: var(--gd); opacity: .5; }
  .sb-create button {
    width: 100%; margin-top: 6px; background: transparent; border: 1px solid var(--gd);
    color: var(--g); font-family: inherit; font-size: 11px; padding: 4px; cursor: pointer; letter-spacing: 1px;
  }
  .sb-create button:hover { background: rgba(0,255,65,.1); }
  .priv-label {
    display: flex; align-items: center; gap: 6px; margin-top: 8px;
    font-size: 11px; color: var(--gd); cursor: pointer; user-select: none;
  }
  .priv-label input[type=checkbox] { accent-color: var(--g); width: 12px; height: 12px; cursor: pointer; }
  .priv-label:has(input:checked) { color: var(--am); }

  /* chat */
  #chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #room-header { background: var(--gdk); border-bottom: 1px solid var(--gd); padding: 6px 14px; flex-shrink: 0; }
  #room-name { font-family: 'VT323', monospace; font-size: 20px; color: var(--g); }
  #share-bar { display: flex; gap: 6px; margin-top: 4px; }
  #share-link {
    flex: 1; background: transparent; border: 1px solid var(--gd); color: var(--gd);
    font-family: inherit; font-size: 11px; padding: 2px 6px; outline: none;
  }
  #copy-btn {
    background: transparent; border: 1px solid var(--gd); color: var(--g);
    font-family: inherit; font-size: 11px; padding: 2px 8px; cursor: pointer;
  }
  #copy-btn:hover { background: rgba(0,255,65,.1); }

  #messages { flex: 1; overflow-y: auto; padding: 8px 14px; display: flex; flex-direction: column; gap: 2px; }
  #messages::-webkit-scrollbar { width: 6px; background: #040d06; }
  #messages::-webkit-scrollbar-thumb { background: var(--gd); }
  .msg { font-size: 13px; line-height: 1.5; display: flex; gap: 8px; word-break: break-word; }
  .msg .ts { color: var(--gd); flex-shrink: 0; font-size: 11px; padding-top: 1px; }
  .msg .nick { flex-shrink: 0; min-width: 90px; text-align: right; }
  .msg .nick.self { color: var(--am); }
  .msg .nick.other { color: #00cfff; }
  .msg .nick.sys-nick { color: var(--gd); }
  .msg .text { color: #ccffcc; }
  .msg.sys .text { color: var(--gd); font-style: italic; }

  #input-area { border-top: 1px solid var(--gd); padding: 8px 14px; display: flex; gap: 8px; flex-shrink: 0; background: #040d06; }
  .prompt { color: var(--g); font-size: 14px; padding-top: 4px; flex-shrink: 0; }
  #msg-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--g); font-family: inherit; font-size: 13px; caret-color: var(--g);
  }
  #msg-input::placeholder { color: var(--gd); opacity: .5; }
  #send-btn {
    background: transparent; border: 1px solid var(--gd); color: var(--g);
    font-family: inherit; font-size: 12px; padding: 4px 12px; cursor: pointer; letter-spacing: 1px;
  }
  #send-btn:hover { background: rgba(0,255,65,.1); border-color: var(--g); }

  /* nick modal */
  #nick-modal {
    position: absolute; inset: 0; background: rgba(0,10,2,.94);
    display: flex; align-items: center; justify-content: center; z-index: 20;
  }
  #nick-box { background: #040d06; border: 1px solid var(--g); padding: 28px 32px; min-width: 300px; }
  #nick-box h2 { font-family: 'VT323', monospace; font-size: 30px; color: var(--g); margin-bottom: 4px; }
  #nick-box p { font-size: 11px; color: var(--gd); margin-bottom: 18px; line-height: 1.6; }
  #nick-input {
    background: transparent; border: none; border-bottom: 1px solid var(--g);
    color: var(--g); font-family: inherit; font-size: 15px; padding: 4px 0;
    width: 100%; outline: none; margin-bottom: 18px;
  }
  #nick-input::placeholder { color: var(--gd); opacity: .5; }
  #join-btn {
    background: transparent; border: 1px solid var(--g); color: var(--g);
    font-family: inherit; font-size: 13px; padding: 8px 20px; cursor: pointer;
    letter-spacing: 2px; width: 100%;
  }
  #join-btn:hover { background: rgba(0,255,65,.1); }

  @media (max-width: 600px) {
    #sidebar { width: 120px; }
    #app { max-height: 100vh; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="titlebar">
    <div class="logo">&#9608; ANONETTE</div>
    <div class="spacer"></div>
    <button class="nick-btn" onclick="showNickModalChange()">NICK: <span id="cur-nick">???</span></button>
  </div>

  <div id="main">
    <div id="sidebar">
      <div class="sb-title">&#35; CHANNELS</div>
      <div id="rooms"></div>
      <div class="sb-create">
        <input id="new-room-input" placeholder="new room name" maxlength="32"/>
        <label class="priv-label">
          <input type="checkbox" id="private-toggle"/>
          <span>PRIVATE</span>
        </label>
        <button onclick="createRoom()">+ CREATE ROOM</button>
      </div>
    </div>

    <div id="chat">
      <div id="room-header">
        <div id="room-name">#...</div>
        <div id="share-bar">
          <input id="share-link" readonly placeholder="join this room and a link will appear here"/>
          <button id="copy-btn" onclick="copyLink()">COPY</button>
        </div>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <div class="prompt">&gt;&gt;</div>
        <input id="msg-input" placeholder="type message... (enter to send)" maxlength="400" autocomplete="off"/>
        <button id="send-btn" onclick="sendMsg()">SEND</button>
      </div>
    </div>
  </div>

  <div id="del-modal">
    <div id="del-box">
      <h3>DELETE ROOM</h3>
      <p>Permanently delete <span id="del-room-name"></span>?<br/>All messages will be gone forever.</p>
      <div class="del-btns">
        <button id="del-confirm-btn" onclick="confirmDelete()">[ DELETE ]</button>
        <button id="del-cancel-btn" onclick="cancelDelete()">[ CANCEL ]</button>
      </div>
    </div>
  </div>

  <div id="nick-modal">
    <div id="nick-box">
      <h2>ANONETTE</h2>
      <p>PICK A NICKNAME TO ENTER.<br/>NO ACCOUNT. NO LOGS. NO TRACES.</p>
      <div id="nick-error" style="display:none;font-size:11px;color:#ff4444;margin-bottom:10px;"></div>
      <input id="nick-input" placeholder="your_nickname" maxlength="20" autocomplete="off"/>
      <button id="join-btn" onclick="setNick()">[ ENTER THE VOID ]</button>
    </div>
  </div>

</div>
</body>
</html>
